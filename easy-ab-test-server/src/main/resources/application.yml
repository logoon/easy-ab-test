server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/easy_ab_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

jwt:
  secret: easy-ab-test-jwt-secret-key-must-be-at-least-256-bits-long-for-security
  expiration: 86400000

logging:
  level:
    com.meetchance.abtest: DEBUG
    org.hibernate.SQL: DEBUG
